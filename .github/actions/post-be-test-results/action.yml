name: Post BE Test Results
description: Post backend test results to PR comment

runs:
  using: composite
  steps:
    - name: 💬 Post BE results to shared comment
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');

          // Find test output files dynamically
          const findTestFile = (dir) => {
            if (!fs.existsSync(dir)) return null;
            const entries = fs.readdirSync(dir, { recursive: true, withFileTypes: true });
            const file = entries.find(f => f.isFile() && f.name.endsWith('output.txt'));
            return file ? path.join(file.parentPath, file.name) : null;
          };

          // Read BE test outputs
          const unitFile = findTestFile('be-unit-test-output');
          const integrationFile = findTestFile('be-integration-test-output');

          const unitOutput = unitFile ? fs.readFileSync(unitFile, 'utf8') : '';
          const integrationOutput = integrationFile ? fs.readFileSync(integrationFile, 'utf8') : '';

          // Parse pytest summary
          const parsePytestSummary = (output) => {
            const match = output.match(/=+\s+(\d+\s+(?:passed|failed|error)[^=]*)\s+=+/);
            return match ? match[1].trim() : 'No results available';
          };

          const beUnitSummary = parsePytestSummary(unitOutput);
          const beIntegrationSummary = parsePytestSummary(integrationOutput);

          // Find existing comment
          const comments = await github.rest.issues.listComments({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo
          });

          const existingComment = comments.data.find(comment =>
            comment.body.includes('<!-- test-results-summary -->')
          );

          // Detect test failures
          const hasUnitFailure = unitOutput.includes('FAILED') || unitOutput.match(/failed/i);
          const hasIntegrationFailure = integrationOutput.includes('FAILED') || integrationOutput.match(/failed/i);

          const unitIcon = hasUnitFailure ? '❌' : '✅';
          const integrationIcon = hasIntegrationFailure ? '❌' : '✅';

          let beBody = `### BE Test Results
          **Unit Tests** ${unitIcon}
          \`\`\`
          ${beUnitSummary}
          \`\`\`

          **Integration Tests** ${integrationIcon}
          \`\`\`
          ${beIntegrationSummary}
          \`\`\``;

          if (existingComment) {
            // Extract FE results if they exist
            const feMatch = existingComment.body.match(/(### FE Test Results[\s\S]*?)(?=### BE|$)/);
            const feSection = feMatch ? feMatch[1].trim() : '### FE Test Results\n_Waiting for frontend tests to complete..._';

            const body = `<!-- test-results-summary -->
            ## Test Results Summary

            ${feSection}

            ${beBody}`;

            await github.rest.issues.updateComment({
              comment_id: existingComment.id,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          } else {
            // Create new comment with placeholder for FE results
            const body = `<!-- test-results-summary -->
            ## Test Results Summary

            ### FE Test Results
            _Waiting for frontend tests to complete..._

            ${beBody}`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }
